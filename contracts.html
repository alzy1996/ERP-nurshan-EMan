<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ERP Nexus — Contracts</title>
<meta name="theme-color" content="#E8612C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="nexus-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="nexus-core.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--primary:#E8612C;--primary-d:#C44D1E;--primary-l:rgba(232,97,44,.09);--blue:#2D7DD2;--blue-l:rgba(45,125,210,.1);--green:#1DB06A;--amber:#E8930A;--red:#E5484D;--purple:#7C3AED;--bg:#F4F5F9;--surface:#FFFFFF;--surface-2:#FAFBFE;--text:#0F1117;--muted:#7B8299;--border:#E7EAF2;--sh-sm:0 1px 3px rgba(15,17,23,.06);--sh:0 1px 3px rgba(15,17,23,.06),0 6px 18px rgba(15,17,23,.05);--sh-lg:0 20px 40px rgba(15,17,23,.16);--r:12px;--r-sm:8px;--r-lg:16px;--glass:rgba(255,255,255,.72);}
[data-theme="dark"]{--bg:#0E1016;--surface:#171A22;--surface-2:#1E222C;--text:#EEF1F7;--muted:#8A92A6;--border:#272C38;--primary-l:rgba(232,97,44,.16);--blue-l:rgba(45,125,210,.18);--glass:rgba(23,26,34,.72);--sh-sm:0 1px 3px rgba(0,0,0,.4);--sh:0 1px 3px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.3);}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:14px;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:9px;height:9px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
.shell{display:flex;height:100vh;height:100dvh;}
.sb{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;height:100dvh;}
.sb-head{padding:18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);}
.sb-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),#F4863F);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px;flex-shrink:0;box-shadow:0 4px 12px rgba(232,97,44,.35);}
.sb-brand{font-size:15px;font-weight:800;letter-spacing:-.3px;}.sb-brand span{color:var(--primary);}
.sb-ver{font-size:10px;color:var(--muted);font-weight:600;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;}
.sb-sec{padding:14px 16px 6px;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;}
.nav-i{display:flex;align-items:center;gap:11px;padding:10px 14px;margin:2px 9px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;transition:background .15s,color .15s;}
.nav-i:hover{background:var(--surface-2);color:var(--text);}
.nav-i.active{background:var(--primary-l);color:var(--primary);font-weight:700;}
.nav-ico{font-size:17px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:1px 7px;border-radius:9px;}
.sb-foot{padding:12px;border-top:1px solid var(--border);}
.u-card{display:flex;align-items:center;gap:10px;}
.u-av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#5AA0E6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0;}
.u-name{font-size:12.5px;font-weight:700;}.u-role{font-size:10.5px;color:var(--muted);}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);transition:all .15s;}
.icon-btn:hover{color:var(--primary);border-color:var(--primary);}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:30;}
.tb-title h1{font-size:17px;font-weight:800;letter-spacing:-.3px;}.tb-title p{font-size:11.5px;color:var(--muted);}
.tb-actions{display:flex;align-items:center;gap:9px;margin-left:auto;}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(29,176,106,.1);border:1px solid rgba(29,176,106,.25);color:var(--green);padding:6px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.live-pill.offline{background:rgba(232,147,10,.1);border-color:rgba(232,147,10,.3);color:var(--amber);}
.live-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(1.6);}}
.content{flex:1;overflow-y:auto;padding:20px 22px 90px;}
.page-grid{max-width:1280px;margin:0 auto;}
.btn{border:none;border-radius:var(--r-sm);font-weight:700;font-size:12px;padding:8px 14px;transition:filter .15s,background .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-pri{background:var(--primary);color:#fff;}.btn-pri:hover{background:var(--primary-d);}
.btn-ok{background:var(--green);color:#fff;}.btn-ok:hover{filter:brightness(.93);}
.btn-no{background:rgba(229,72,77,.12);color:var(--red);}.btn-no:hover{background:rgba(229,72,77,.2);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{padding:6px 11px;font-size:11px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:999px;}
.b-green{background:rgba(29,176,106,.12);color:#0e7a4a;}.b-amber{background:rgba(232,147,10,.13);color:#a06003;}.b-red{background:rgba(229,72,77,.12);color:#c0292e;}.b-blue{background:var(--blue-l);color:#1a5fa0;}.b-grey{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh-sm);}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar h2{font-size:15px;font-weight:800;}
/* expiry alerts */
.expiry-wrap{margin-bottom:16px;display:flex;flex-direction:column;gap:8px;}
.expiry-item{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-left:4px solid var(--amber);border-radius:10px;padding:10px 13px;background:var(--surface);}
.expiry-item.soon{border-left-color:var(--red);}
.expiry-item .ei-d{margin-left:auto;font-weight:800;font-size:12px;}
/* contract grid */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;box-shadow:var(--sh-sm);transition:transform .15s,box-shadow .15s;}
.ccard:hover{transform:translateY(-2px);box-shadow:var(--sh);}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.cc-title{font-size:14px;font-weight:800;line-height:1.3;}
.cc-meta{font-size:12px;color:var(--muted);margin:2px 0;}
.cc-val{font-size:16px;font-weight:800;margin:8px 0;}
.cc-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 16px;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(8,10,16,.45);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:120;padding:18px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:pop .2s cubic-bezier(.16,1,.3,1);}
@keyframes pop{from{transform:scale(.96);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-h{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-t{font-size:15px;font-weight:800;}
.modal-b{padding:18px;}
.modal-f{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.fld{margin-bottom:13px;}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.fld input,.fld select,.fld textarea{width:100%;min-height:40px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font-family:inherit;font-size:13px;outline:none;}
.fld textarea{min-height:74px;resize:vertical;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:14px;}
.seg button{flex:1;border:none;background:none;padding:7px;border-radius:7px;font-size:12px;font-weight:700;color:var(--muted);}
.seg button.on{background:var(--primary);color:#fff;}
.psi-item{border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px;}
.psi-item img{max-width:100%;border-radius:8px;margin-top:8px;}
.detail-row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.detail-row span:first-child{color:var(--muted);}
.sig-show{max-width:240px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-top:6px;}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:50;justify-content:space-around;}
.bn-i{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:9.5px;font-weight:700;}
.bn-i.active{color:var(--primary);}.bn-i .nav-ico{font-size:19px;}
.toast-wrap{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:10px;padding:12px 14px;box-shadow:var(--sh-lg);font-size:12.5px;font-weight:600;min-width:240px;animation:slideIn .3s ease;}
@keyframes slideIn{from{transform:translateX(120%);}to{transform:translateX(0);}}
/* print sheet */
.print-sheet{display:none;}
@media print{.shell,.bottom-nav,.toast-wrap,.overlay{display:none!important;}.print-sheet{display:block!important;}body{overflow:visible;background:#fff;}}
.print-preview{position:fixed;inset:0;background:rgba(8,10,16,.5);z-index:150;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;}
.print-preview.open{display:flex;}
.sheet{background:#fff;color:#111;max-width:760px;width:100%;border-radius:10px;padding:42px;font-size:13px;line-height:1.7;}
.sheet h1{font-size:22px;margin-bottom:4px;color:#111;}
.sheet .muted{color:#666;font-size:12px;}
.sheet hr{border:none;border-top:1px solid #ddd;margin:16px 0;}
.sheet .sec-t{font-weight:800;margin:14px 0 4px;font-size:13px;}
.sign-grid{display:flex;gap:40px;margin-top:36px;flex-wrap:wrap;}
.sign-box{flex:1;min-width:200px;border-top:1.5px solid #111;padding-top:6px;font-size:12px;}
@media(max-width:760px){.sb{display:none;}.bottom-nav{display:flex;}.topbar{padding:10px 14px;}.content{padding:14px 14px 90px;}.row2{grid-template-columns:1fr;}}
</style>
<link rel="stylesheet" href="nexus-skin.css">
</head>
<body>
<div class="shell">
  <aside class="sb" id="sidebar"></aside>
  <main class="main">
    <header class="topbar">
      <div class="tb-title"><h1>Contracts</h1><p id="tbSub">E-contracts &amp; signatures</p></div>
      <div class="tb-actions">
        <div class="live-pill" id="livePill"><span class="live-dot"></span><span>Live</span></div>
        <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
      </div>
    </header>
    <div class="content">
      <div class="page-grid">
        <div class="expiry-wrap" id="expiryAlerts"></div>
        <div class="toolbar">
          <h2>All Contracts</h2>
          <button class="btn btn-pri btn-sm" id="newContractBtn" style="margin-left:auto" onclick="openNewContract()">＋ New Contract</button>
        </div>
        <div class="cgrid" id="contractGrid"></div>
      </div>
    </div>
  </main>
</div>
<nav class="bottom-nav" id="bottomNav"></nav>

<!-- New Contract modal -->
<div class="overlay" id="newModal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-h"><div class="modal-t">New Contract</div><button class="icon-btn" onclick="closeModal('newModal')" aria-label="Close">✕</button></div>
    <div class="modal-b">
      <div class="fld"><label>Contract title</label><input id="cTitle" placeholder="e.g. Asphalt supply — Section B"></div>
      <div class="row2">
        <div class="fld"><label>Contractor name</label><input id="cName" placeholder="e.g. AL NOOR CONTRACTING"></div>
        <div class="fld"><label>Contractor phone</label><input id="cPhone" placeholder="+968 9XXX XXXX"></div>
      </div>
      <div class="row2">
        <div class="fld"><label>Contract value (OMR)</label><input id="cValue" type="number" step="0.001" placeholder="0.000"></div>
        <div class="fld"><label>&nbsp;</label><div style="font-size:11px;color:var(--muted);padding-top:11px">Status starts as Draft</div></div>
      </div>
      <div class="row2">
        <div class="fld"><label>Start date</label><input id="cStart" type="date"></div>
        <div class="fld"><label>End date</label><input id="cEnd" type="date"></div>
      </div>
      <div class="fld"><label>Scope of work</label><textarea id="cScope" placeholder="Describe the scope…"></textarea></div>
      <div class="fld"><label>Terms &amp; conditions</label><textarea id="cTerms" placeholder="Payment terms, penalties, delivery…"></textarea></div>
      <div class="msg" id="cMsg" style="color:var(--red);font-size:12px;font-weight:600;min-height:16px"></div>
    </div>
    <div class="modal-f"><button class="btn btn-ghost" onclick="closeModal('newModal')">Cancel</button><button class="btn btn-pri" id="saveContractBtn" onclick="createContract()">Create Contract</button></div>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detailModal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-h"><div class="modal-t" id="dTitle">Contract</div><button class="icon-btn" onclick="closeModal('detailModal')" aria-label="Close">✕</button></div>
    <div class="modal-b">
      <div class="seg"><button id="tabInfo" class="on" onclick="detailTab('info')">Details</button><button id="tabPsi" onclick="detailTab('psi')">PSI History</button></div>
      <div id="detailInfo"></div>
      <div id="detailPsi" style="display:none"></div>
    </div>
  </div>
</div>

<!-- PSI add modal -->
<div class="overlay" id="psiModal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-h"><div class="modal-t">Add PSI Record</div><button class="icon-btn" onclick="closeModal('psiModal')" aria-label="Close">✕</button></div>
    <div class="modal-b">
      <div class="row2">
        <div class="fld"><label>Inspection date</label><input id="pDate" type="date"></div>
        <div class="fld"><label>Inspector name</label><input id="pInspector" placeholder="Inspector"></div>
      </div>
      <div class="fld"><label>Item inspected</label><input id="pItem" placeholder="e.g. Bitumen 60/70 — 100 ton"></div>
      <div class="fld"><label>Result</label><select id="pResult"><option>Pass</option><option>Fail</option></select></div>
      <div class="fld"><label>Notes</label><textarea id="pNotes" placeholder="Observations…"></textarea></div>
      <div class="fld"><label>Photo (optional)</label><input id="pPhoto" type="file" accept="image/*" capture="environment"></div>
      <div class="msg" id="pMsg" style="color:var(--red);font-size:12px;font-weight:600;min-height:16px"></div>
    </div>
    <div class="modal-f"><button class="btn btn-ghost" onclick="closeModal('psiModal')">Cancel</button><button class="btn btn-pri" id="savePsiBtn" onclick="addPsi()">Save PSI</button></div>
  </div>
</div>

<!-- Print preview -->
<div class="print-preview" id="printPreview">
  <div>
    <div style="display:flex;gap:8px;margin-bottom:10px;justify-content:flex-end">
      <button class="btn btn-pri btn-sm" onclick="window.print()">🖨️ Print</button>
      <button class="btn btn-ghost btn-sm" style="background:#fff" onclick="closePrint()">Close</button>
    </div>
    <div class="sheet print-sheet" id="printSheet"></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
"use strict";
var db=window.db; /* Firebase initialised by nexus-core.js */
var NAV=[{sec:'Overview'},{id:'dashboard',label:'Command Center',ico:'◈',href:'dashboard.html'},{id:'analytics',label:'Analytics',ico:'📊',href:'analytics.html'},{sec:'Procurement'},{id:'materials',label:'Materials',ico:'📦',href:'materials.html'},{id:'suppliers',label:'Suppliers',ico:'🏭',href:'suppliers.html'},{id:'offers',label:'Offers',ico:'🏷️',href:'offers.html'},{id:'purchaserequests',label:'Purchase Requests',ico:'📋',href:'purchaserequests.html'},{id:'contracts',label:'Contracts',ico:'📄',href:'contracts.html'},{id:'attendance',label:'Attendance',ico:'🛂',href:'attendance.html'},{sec:'Workspace'},{id:'notifications',label:'Notifications',ico:'🔔',href:'notifications.html'},{id:'settings',label:'Settings',ico:'⚙️',href:'settings.html'}];
var BOTTOM=['dashboard','contracts','attendance','suppliers','settings'];
var CURRENT='contracts';
var USER={name:'User',role:'',initials:'U'};
var CONTRACTS=[],PSI=[],activeContractId=null;

function $(s,r){return (r||document).querySelector(s);}
function el(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;}
function fmtOMR(n){return Number(n||0).toLocaleString('en-OM',{minimumFractionDigits:0,maximumFractionDigits:3});}
function esc(t){return String(t==null?'':t).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function toast(m){var w=$('#toastWrap');var t=el('div','toast',m);w.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3500);}
function daysLeft(d){if(!d)return 9999;return Math.ceil((new Date(d)-new Date())/864e5);}

function applyTheme(t){document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');var b=$('#themeBtn');if(b)b.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('nexus-theme',t);}
function initTheme(){var s=localStorage.getItem('nexus-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');applyTheme(s);$('#themeBtn').onclick=function(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');};}
function signOut(){if(window.Nexus){Nexus.logout();}}

function renderShell(){
  var sb=$('#sidebar');
  var h='<div class="sb-head"><div class="sb-mark">NX</div><div><div class="sb-brand">ERP <span>Nexus</span></div><div class="sb-ver">Procurement · v2.0</div></div></div><nav class="sb-nav">';
  NAV.forEach(function(n){
    if(n.sec){h+='<div class="sb-sec">'+n.sec+'</div>';return;}
    h+='<a class="nav-i'+(n.id===CURRENT?' active':'')+'" href="'+n.href+'"><span class="nav-ico">'+n.ico+'</span>'+n.label+'</a>';
  });
  h+='</nav><div class="sb-foot"><div class="u-card"><div class="u-av">'+USER.initials+'</div><div style="flex:1;min-width:0"><div class="u-name">'+USER.name+'</div><div class="u-role">'+USER.role+'</div></div><button class="icon-btn" onclick="signOut()" aria-label="Sign out">⏻</button></div></div>';
  sb.innerHTML=h;
  var bn=$('#bottomNav');var bh='';BOTTOM.forEach(function(id){var n=NAV.find(function(x){return x.id===id;});if(!n)return;bh+='<a class="bn-i'+(id===CURRENT?' active':'')+'" href="'+n.href+'"><span class="nav-ico">'+n.ico+'</span>'+n.label.split(' ')[0]+'</a>';});bn.innerHTML=bh;
}
function initLive(){function set(on){var p=$('#livePill');if(on){p.classList.remove('offline');p.innerHTML='<span class="live-dot"></span><span>Live</span>';}else{p.classList.add('offline');p.innerHTML='<span class="live-dot"></span><span>Offline</span>';}}window.addEventListener('online',function(){set(true);});window.addEventListener('offline',function(){set(false);});set(navigator.onLine);}

function openModal(id){$('#'+id).classList.add('open');}
function closeModal(id){$('#'+id).classList.remove('open');}

/* ---- render contracts ---- */
function statusBadge(s){if(s==='Signed')return '<span class="badge b-green">Signed</span>';return '<span class="badge b-grey">Draft</span>';}
function renderContracts(){
  var g=$('#contractGrid');
  if(!CONTRACTS.length){g.innerHTML='<div class="empty">No contracts yet. Click “New Contract” to create one.</div>';return;}
  var html='';
  CONTRACTS.slice().sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);}).forEach(function(c){
    html+='<div class="ccard">';
    html+='<div class="cc-top"><div class="cc-title">'+esc(c.title)+'</div>'+statusBadge(c.status)+'</div>';
    html+='<div class="cc-meta">👷 '+esc(c.contractorName||'—')+'</div>';
    html+='<div class="cc-meta">📅 '+esc(c.startDate||'?')+' → '+esc(c.endDate||'?')+'</div>';
    html+='<div class="cc-val">'+fmtOMR(c.value)+' <span style="font-size:11px;color:var(--muted);font-weight:600">OMR</span></div>';
    html+='<div class="cc-actions">';
    html+='<button class="btn btn-ghost btn-sm" onclick="openDetail(\''+c.id+'\')">View</button>';
    html+='<button class="btn btn-ghost btn-sm" onclick="printContract(\''+c.id+'\')">🖨️ Print</button>';
    if(c.status!=='Signed'){html+='<button class="btn btn-ok btn-sm" onclick="sendWhatsApp(\''+c.id+'\')">📲 Send to contractor</button>';}
    if(window.Nexus&&Nexus.isAdmin()){html+='<button class="btn btn-no btn-sm" onclick="deleteContract(\''+c.id+'\')" title="Delete (admin)">🗑️</button>';}
    html+='</div></div>';
  });
  g.innerHTML=html;
}

/* ---- expiry alerts (admin) ---- */
function renderExpiry(){
  var w=$('#expiryAlerts');
  if(!window.Nexus||!Nexus.isAdmin()){w.innerHTML='';return;}
  var soon=CONTRACTS.filter(function(c){var d=daysLeft(c.endDate);return c.status!=='Expired'&&d>=0&&d<=30;}).sort(function(a,b){return daysLeft(a.endDate)-daysLeft(b.endDate);});
  if(!soon.length){w.innerHTML='';return;}
  var html='<div class="card" style="border-color:rgba(232,147,10,.35)"><div style="font-weight:800;font-size:13px;margin-bottom:10px">⏰ Expiry Alerts <span style="color:var(--muted);font-weight:600">— contracts ending within 30 days</span></div>';
  soon.forEach(function(c){
    var d=daysLeft(c.endDate);var cls=d<=7?' soon':'';
    html+='<div class="expiry-item'+cls+'"><div><div style="font-weight:700;font-size:13px">'+esc(c.title)+'</div><div style="font-size:11px;color:var(--muted)">'+esc(c.contractorName||'')+' · ends '+esc(c.endDate)+'</div></div><div class="ei-d" style="color:'+(d<=7?'var(--red)':'var(--amber)')+'">'+d+' day'+(d===1?'':'s')+'</div></div>';
  });
  html+='</div>';w.innerHTML=html;
}

/* ---- create contract ---- */
function openNewContract(){$('#cMsg').textContent='';openModal('newModal');}
function createContract(){
  var t=$('#cTitle').value.trim();var name=$('#cName').value.trim();
  var msg=$('#cMsg');msg.textContent='';
  if(!t){msg.textContent='Enter a contract title';return;}
  if(!name){msg.textContent='Enter the contractor name';return;}
  if(window.Nexus.activeSite()===Nexus.ALL){msg.textContent='Select a specific site (top bar) before creating a contract';return;}
  var btn=$('#saveContractBtn');btn.disabled=true;
  Nexus.add('contracts',{
    title:t,contractorName:name,contractorPhone:$('#cPhone').value.trim(),
    value:parseFloat($('#cValue').value)||0,startDate:$('#cStart').value,endDate:$('#cEnd').value,
    scope:$('#cScope').value.trim(),terms:$('#cTerms').value.trim(),status:'Draft'
  }).then(function(){
    btn.disabled=false;closeModal('newModal');
    ['cTitle','cName','cPhone','cValue','cStart','cEnd','cScope','cTerms'].forEach(function(id){$('#'+id).value='';});
    toast('Contract created (Draft)');reload();
  }).catch(function(){btn.disabled=false;msg.textContent='Could not save — try again';});
}
function deleteContract(id){
  var c=CONTRACTS.find(function(x){return x.id===id;});if(!c)return;
  if(!confirm('Delete contract "'+c.title+'"? This cannot be undone.'))return;
  Nexus.remove('contracts',id).then(function(){toast('Contract deleted');reload();}).catch(function(e){toast(e.message||'Could not delete');});
}

/* ---- WhatsApp send (token first) ---- */
function sendWhatsApp(id){
  var c=CONTRACTS.find(function(x){return x.id===id;});if(!c)return;
  var phone=(c.contractorPhone||'').replace(/\D/g,'');
  if(!phone){toast('This contract has no contractor phone');return;}
  var site=Nexus.activeSite();var token='sign-'+Date.now().toString(36);
  var base=location.href.replace(/[^/]*$/,'');
  var link=base+'contract-sign.html?contract='+encodeURIComponent(id)+'&site='+encodeURIComponent(site)+'&token='+token;
  var msg='Hello '+c.contractorName+', please review and sign the contract "'+c.title+'" here: '+link;
  var go=function(){window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank','noopener,noreferrer');toast('Signing link sent to '+c.contractorName);};
  if(db){db.collection('nexus_whatsapp_tokens').add({contractId:id,token:token,to:c.contractorPhone,message:msg,by:(Nexus.session()||{}).username||'user',siteId:site,at:Date.now()}).then(go).catch(go);}
  else{go();}
}

/* ---- detail + PSI ---- */
function openDetail(id){
  activeContractId=id;var c=CONTRACTS.find(function(x){return x.id===id;});if(!c)return;
  $('#dTitle').textContent=c.title;
  detailTab('info');
  var rows=[['Contractor',c.contractorName],['Phone',c.contractorPhone],['Value',fmtOMR(c.value)+' OMR'],['Start',c.startDate],['End',c.endDate],['Status',c.status],['Scope',c.scope],['Terms',c.terms]];
  var html='';
  rows.forEach(function(r){html+='<div class="detail-row"><span>'+r[0]+'</span><span style="text-align:right;font-weight:600">'+esc(r[1]||'—')+'</span></div>';});
  if(c.status==='Signed'){
    html+='<div style="margin-top:12px;font-size:12px;color:var(--muted)">Signed by <b style="color:var(--text)">'+esc(c.signerName||'')+'</b> on '+new Date(c.signedAt||Date.now()).toLocaleString('en-GB')+'</div>';
    if(c.signatureImg){html+='<img class="sig-show" src="'+c.signatureImg+'" alt="signature">';}
  }
  $('#detailInfo').innerHTML=html;
  renderPsiList(id);
  openModal('detailModal');
}
function detailTab(t){
  $('#tabInfo').classList.toggle('on',t==='info');$('#tabPsi').classList.toggle('on',t==='psi');
  $('#detailInfo').style.display=t==='info'?'block':'none';
  $('#detailPsi').style.display=t==='psi'?'block':'none';
}
function renderPsiList(contractId){
  var list=PSI.filter(function(p){return p.contractId===contractId;}).sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});
  var html='<button class="btn btn-pri btn-sm" style="margin-bottom:10px" onclick="openPsi()">＋ Add PSI Record</button>';
  if(!list.length){html+='<div class="empty" style="padding:18px">No PSI records yet.</div>';}
  list.forEach(function(p){
    var rb=p.result==='Fail'?'<span class="badge b-red">Fail</span>':'<span class="badge b-green">Pass</span>';
    html+='<div class="psi-item"><div style="display:flex;justify-content:space-between"><b style="font-size:13px">'+esc(p.item||'')+'</b>'+rb+'</div>';
    html+='<div style="font-size:11.5px;color:var(--muted);margin-top:3px">'+esc(p.inspectionDate||'')+' · '+esc(p.inspectorName||'')+'</div>';
    if(p.notes){html+='<div style="font-size:12px;margin-top:5px">'+esc(p.notes)+'</div>';}
    if(p.photoImg){html+='<img src="'+p.photoImg+'" alt="PSI photo">';}
    html+='</div>';
  });
  $('#detailPsi').innerHTML=html;
}
function openPsi(){$('#pMsg').textContent='';$('#pDate').value=new Date().toISOString().slice(0,10);openModal('psiModal');}
function addPsi(){
  var item=$('#pItem').value.trim();var msg=$('#pMsg');msg.textContent='';
  if(!item){msg.textContent='Enter the item inspected';return;}
  var btn=$('#savePsiBtn');btn.disabled=true;
  var base={contractId:activeContractId,inspectionDate:$('#pDate').value,inspectorName:$('#pInspector').value.trim(),item:item,result:$('#pResult').value,notes:$('#pNotes').value.trim()};
  var file=$('#pPhoto').files[0];
  var save=function(photo){
    if(photo)base.photoImg=photo;
    Nexus.add('psi',base).then(function(){
      btn.disabled=false;closeModal('psiModal');
      ['pInspector','pItem','pNotes'].forEach(function(id){$('#'+id).value='';});$('#pPhoto').value='';
      toast('PSI record saved');reload();
    }).catch(function(){btn.disabled=false;msg.textContent='Could not save';});
  };
  if(file){Nexus.resizeImage(file,1000,0.6).then(save).catch(function(){save(null);});}
  else{save(null);}
}

/* ---- printable ---- */
function printContract(id){
  var c=CONTRACTS.find(function(x){return x.id===id;});if(!c)return;
  var site=(Nexus.session()||{}).name;
  var h='<h1>'+esc(c.title)+'</h1><div class="muted">Contract reference: '+esc(c.id)+' · Status: '+esc(c.status)+'</div><hr>';
  h+='<div class="detail-row"><span>Contractor</span><span>'+esc(c.contractorName)+'</span></div>';
  h+='<div class="detail-row"><span>Contract value</span><span>'+fmtOMR(c.value)+' OMR</span></div>';
  h+='<div class="detail-row"><span>Period</span><span>'+esc(c.startDate||'?')+' → '+esc(c.endDate||'?')+'</span></div>';
  h+='<div class="sec-t">Scope of Work</div><div>'+esc(c.scope||'—')+'</div>';
  h+='<div class="sec-t">Terms &amp; Conditions</div><div>'+esc(c.terms||'—')+'</div>';
  h+='<div class="sign-grid"><div class="sign-box">Contractor signature'+(c.status==='Signed'&&c.signatureImg?'<br><img src="'+c.signatureImg+'" style="max-width:200px;margin-top:6px">':'')+'<br>'+esc(c.signerName||'')+'</div><div class="sign-box">For the Company<br>&nbsp;</div></div>';
  $('#printSheet').innerHTML=h;
  $('#printPreview').classList.add('open');
}
function closePrint(){$('#printPreview').classList.remove('open');}

/* ---- boot ---- */
function reload(){
  return Nexus.load([
    {name:'contracts',apply:function(a){CONTRACTS=a;}},
    {name:'psi',apply:function(a){PSI=a;}}
  ]).then(function(){renderContracts();renderExpiry();renderShell();Nexus.applyChrome('contracts');});
}
function boot(){
  if(!window.Nexus||!Nexus.requireAuth())return;
  if(!Nexus.guardSection('contracts'))return;
  Nexus.applyIdentity();
  var s=Nexus.session()||{};
  USER={name:s.name||'User',role:s.jobType||'',initials:(s.name||'U').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()};
  initTheme();renderShell();renderContracts();initLive();Nexus.applyChrome('contracts');
  reload();
  document.querySelectorAll('.overlay').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});});
}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){document.querySelectorAll('.overlay.open').forEach(function(o){o.classList.remove('open');});closePrint();}});
document.addEventListener('DOMContentLoaded',boot);
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('nexus-sw.js').catch(function(){});});}
</script>
