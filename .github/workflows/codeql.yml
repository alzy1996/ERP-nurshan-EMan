name: CodeQL

# Static code scanning (SAST). CodeQL reads the application source and looks for
# real vulnerability patterns — injection, unsafe data flow, etc. It runs on
# every PR to main, on every push to main, and once a week so newly published
# rules catch issues in code that hasn't changed. Findings appear under the
# repo's Security -> Code scanning alerts. (Free for public repositories.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 04:27 UTC — picks up new query rules against existing code.
    - cron: "27 4 * * 1"
  workflow_dispatch: {}

jobs:
  analyze:
    name: CodeQL — JavaScript/TypeScript
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # Covers both apps (next/ and react/) and all .js/.ts/.tsx source.
          languages: javascript-typescript
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
