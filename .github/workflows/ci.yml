name: CI

# Quality gate. Runs on every pull request to main: builds both apps and runs
# the Firestore security-rule tests. Make these checks REQUIRED in branch
# protection (Settings -> Branches) so nothing reaches main — and the automatic
# deploy — until they pass.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-next:
    name: Build — Next app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd next && npm ci && NEXT_EXPORT=true npm run build

  build-react:
    name: Build — React app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd react && npm ci && npm run build

  rules-tests:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm install -g firebase-tools
      - run: cd firestore-tests && npm install
      - name: Run rules tests against the Firestore emulator
        run: firebase emulators:exec --only firestore --project demo-erp-nexus "cd firestore-tests && npm test"
