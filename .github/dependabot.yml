# Automated dependency + security updates. Dependabot opens PRs (which go through
# review before deploy) when a library has an update or a known vulnerability.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/next"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      all-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/react"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      all-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
